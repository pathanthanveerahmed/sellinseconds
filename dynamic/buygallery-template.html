  <style>
    html, body { margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f9f9f9; color: #111; }

    .call-stock {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      text-align: center;
      font-weight: bold;
      font-size: 1rem;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 2px solid #8B0000;
      color: #8B0000;
    }
    .call-stock a { color: #8B0000; text-decoration: underline; }

    .content-wrapper { padding: 20px; padding-top: 60px; }

    .card {
      margin: 10px auto;
      max-width: 95%;
      border: 2px solid #ccc;
      border-radius: 10px;
      overflow: hidden;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      scroll-margin-top: 60px;
    }
    .card img { width: 100%; display: block; border-radius: 8px; max-width: 480px; margin: 0 auto; }
    .badge { position: absolute; top: 8px; left: 8px; background: red; color: white; padding: 4px 6px; font-size: 12px; border-radius: 4px; }
    .img-wrapper { position: relative; }
    .whatsapp-buttons-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; gap: 10px; }
    .whatsapp-buttons-row a { background: #25D366; color: white; text-decoration: none; padding: 6px 12px; border-radius: 5px; display: flex; align-items: center; font-size: 14px; }
    .whatsapp-buttons-row img { width: 20px; height: 20px; margin-right: 6px; }

    @keyframes cardPulse {
      0%   { box-shadow: 0 0 0 0 rgba(37,211,102,0.6), 0 2px 8px rgba(0,0,0,0.05); border-color: #25D366; }
      50%  { box-shadow: 0 0 0 8px rgba(37,211,102,0), 0 2px 8px rgba(0,0,0,0.05); border-color: #25D366; }
      100% { box-shadow: 0 0 0 0 rgba(37,211,102,0), 0 2px 8px rgba(0,0,0,0.05); border-color: #ccc; }
    }
    .card-pulse { animation: cardPulse 0.7s ease-out 2; }

    #sticky-bar {
      display: none;
      position: fixed;
      top: 45px;
      left: 0;
      right: 0;
      z-index: 999;
      background: #111;
      color: white;
      padding: 8px 14px;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #sticky-bar.visible { display: flex; }
    #sticky-bar .sticky-price {
      font-size: 15px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 55%;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      -webkit-tap-highlight-color: rgba(255,255,255,0.2);
    }
    #sticky-bar a { background: #25D366; color: white; text-decoration: none; padding: 6px 12px; border-radius: 5px; font-size: 13px; white-space: nowrap; }
  </style>
</head>
<body>

  <div class="call-stock">
    📞 Call <a href="tel:+919886566379">98865 66379</a> for latest stock
  </div>

  <div id="sticky-bar">
    <span class="sticky-price" id="sticky-title"></span>
    <a id="sticky-wa" href="#">Interested? 💬</a>
  </div>

  <div class="content-wrapper">
    <div id="gallery">
      {{CARDS}}
    </div>
  </div>

  <script>
    window.addEventListener("load", () => {
      const scrollToId = sessionStorage.getItem("scrollToCardId");
      if (!scrollToId) return;
      sessionStorage.removeItem("scrollToCardId");

      const el = document.querySelector('[data-id="' + scrollToId + '"]');
      if (!el) return;

      el.scrollIntoView({ behavior: "instant", block: "start" });

      el.classList.add("card-pulse");
      el.addEventListener("animationend", () => {
        el.classList.remove("card-pulse");
      }, { once: true });

      const titleEl = el.querySelector("h3, h2, h1, strong, .card-title");
      const waLink = el.querySelector('.whatsapp-buttons-row a[href*="wa.me/9"]');
      const stickyBar = document.getElementById("sticky-bar");
      const stickyTitle = document.getElementById("sticky-title");
      const stickyWa = document.getElementById("sticky-wa");

      if (titleEl) {
        stickyTitle.textContent = titleEl.textContent.trim();
        // Works on all platforms including iOS Safari
        stickyTitle.addEventListener('click', () => {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        stickyTitle.addEventListener('touchend', (e) => {
          e.preventDefault();
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      }

      if (waLink) stickyWa.href = waLink.href;

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (!entry.isIntersecting) {
            stickyBar.classList.add("visible");
          } else {
            stickyBar.classList.remove("visible");
          }
        });
      }, { threshold: 0.1 });

      observer.observe(el);
    });
  </script>
</body>
</html>
