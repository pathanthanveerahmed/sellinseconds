<script>
  function updateLayout() {

    const callStock = document.getElementById("call-stock");
    const stickyBar = document.getElementById("sticky-bar");
    const contentWrapper = document.getElementById("content-wrapper");

    if (callStock) {

      const h = callStock.offsetHeight;

      if (stickyBar) {

        stickyBar.style.top =
          (h + 52 + (window.visualViewport ? window.visualViewport.offsetTop : 0)) + "px";
      }

      if (contentWrapper) {

        contentWrapper.style.paddingTop = (h + 68) + "px";
      }
    }
  }

  window.addEventListener("load", updateLayout);
  window.addEventListener("resize", updateLayout);
  window.addEventListener("scroll", updateLayout, { passive: true });

  window.addEventListener("load", () => {

    const scrollToId = sessionStorage.getItem("scrollToCardId");

    if (!scrollToId) return;

    sessionStorage.removeItem("scrollToCardId");

    const el = document.querySelector('[data-id="' + scrollToId + '"]');

    if (!el) return;

    el.scrollIntoView({
      behavior: "instant",
      block: "start"
    });

    el.classList.add("card-pulse");

    el.addEventListener("animationend", () => {
      el.classList.remove("card-pulse");
    }, { once: true });

    const titleEl = el.querySelector("h3, h2, h1, strong, .card-title");

    const waLink = el.querySelector('.whatsapp-buttons-row a[href*="wa.me/9"]');

    const stickyBar = document.getElementById("sticky-bar");
    const stickyTitle = document.getElementById("sticky-title");
    const stickyWa = document.getElementById("sticky-wa");

    if (titleEl) {

      const fullText = titleEl.textContent.trim();

      const priceMatch = fullText.match(/₹[\d,]+/);

      const price = priceMatch ? priceMatch[0] : '';

      const nameOnly = fullText
        .split(',')[0]
        .replace(/₹[\d,]+/, '')
        .trim();

      stickyTitle.textContent =
        nameOnly + (price ? ' ' + price : '');

      stickyTitle.addEventListener("click", () => {

        window.scrollTo({
          top: el.offsetTop - 120,
          behavior: "smooth"
        });

      });
    }

    if (waLink) stickyWa.href = waLink.href;

    const observer = new IntersectionObserver((entries) => {

      entries.forEach(entry => {

        if (!entry.isIntersecting) {

          stickyBar.classList.add("visible");

        } else {

          stickyBar.classList.remove("visible");
        }

      });

    }, { threshold: 0.1 });

    observer.observe(el);

  });
</script>
