  <script>

    function updateLayout() {

      const callStock =
        document.querySelector(".call-stock");

      const stickyBar =
        document.getElementById("sticky-bar");

      const contentWrapper =
        document.querySelector(".content-wrapper");

      const waBanner =
        document.querySelector(".wa-channel-banner");

      const clinicStrip =
        document.querySelector(".clinic-strip");

      const totalHeight =
        callStock.offsetHeight +
        waBanner.offsetHeight +
        clinicStrip.offsetHeight;

      stickyBar.style.top =
        totalHeight + "px";

      contentWrapper.style.paddingTop =
        (totalHeight + 20) + "px";
    }

    window.addEventListener("load", updateLayout);
    window.addEventListener("resize", updateLayout);

    window.addEventListener("load", () => {

      const scrollToId =
        sessionStorage.getItem("scrollToCardId");

      if (!scrollToId) return;

      sessionStorage.removeItem("scrollToCardId");

      const el =
        document.querySelector(
          '[data-id="' + scrollToId + '"]'
        );

      if (!el) return;

      const stickyOffset =
        document.querySelector(".call-stock").offsetHeight +
        document.querySelector(".wa-channel-banner").offsetHeight +
        document.querySelector(".clinic-strip").offsetHeight +
        12;

      window.scrollTo({
        top: el.offsetTop - stickyOffset,
        behavior: "instant"
      });

      el.classList.add("card-pulse");

      setTimeout(() => {

        el.classList.remove("card-pulse");

      }, 2000);

      const titleEl =
        el.querySelector("h3");

      const waLink =
        el.querySelector(
          '.whatsapp-buttons-row a'
        );

      const stickyBar =
        document.getElementById("sticky-bar");

      const stickyTitle =
        document.getElementById("sticky-title");

      const stickyWa =
        document.getElementById("sticky-wa");

      if (titleEl) {

        stickyTitle.textContent =
          titleEl.textContent.trim();

        stickyTitle.onclick = () => {

          window.scrollTo({
            top: el.offsetTop - stickyOffset,
            behavior: "smooth"
          });

        };

      }

      if (waLink) {

        stickyWa.href = waLink.href;

      }

      const observer =
        new IntersectionObserver(

          (entries) => {

            entries.forEach(entry => {

              if (!entry.isIntersecting) {

                stickyBar.classList.add("visible");

              } else {

                stickyBar.classList.remove("visible");

              }

            });

          },

          {
            threshold: 0.1
          }

        );

      observer.observe(el);

    });

  </script>
